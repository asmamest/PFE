# Redis configuration with persistence
# Place in monitoring/ directory or use directly in docker-compose

# Persistence - RDB snapshots
save 60 1000        # Save after 60s if at least 1000 keys changed
save 300 10         # Save after 300s if at least 10 keys changed
save 900 1          # Save after 900s if at least 1 key changed

# Persistence - AOF (Append-Only File)
appendonly yes                    # Enable AOF
appendfilename "appendonly.aof"  # AOF file name
appendfsync everysec             # Sync to disk every second (balance between safety & performance)

# Memory management
maxmemory 2gb                    # Max memory for Redis
maxmemory-policy allkeys-lru     # Evict LRU keys when limit reached

# Replication (if using Redis Cluster)
# replicaof <master-host> <master-port>

# Database
databases 16

# Logging
loglevel notice
logfile ""  # Log to stdout in Docker

# Timeouts
timeout 0
tcp-keepalive 300

# Snapshot directory (for Docker volumes)
dir /data

# Authentication (optional)
# requirepass yourpassword

# Network
bind 0.0.0.0
protected-mode no
